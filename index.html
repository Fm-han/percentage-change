<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百分比变化计算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; text-align: center; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; }
        .result { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 16px; }
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #ddd; }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: #666; }
        .result-value { font-weight: 600; }
        .positive { color: #28a745; }
        .negative { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>百分比变化计算器</h1>
        <div class="card">
            <div class="form-group">
                <label>原始值</label>
                <input type="number" id="original" placeholder="输入原始数值" step="any">
            </div>
            <div class="form-group">
                <label>新值</label>
                <input type="number" id="new" placeholder="输入新数值" step="any">
            </div>
            <button class="btn btn-blue" onclick="calculate()">计算</button>
            <button class="btn btn-gray" onclick="clearCalc()">清空</button>
        </div>
        <div class="card">
            <div class="result" id="result" style="display:none;">
                <div class="result-item">
                    <span class="result-label">变化量</span>
                    <span class="result-value" id="change"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">百分比变化</span>
                    <span class="result-value" id="percentChange"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">变化比例</span>
                    <span class="result-value" id="ratio"></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calculate() {
            const original = parseFloat(document.getElementById('original').value);
            const newVal = parseFloat(document.getElementById('new').value);
            
            if (isNaN(original) || isNaN(newVal)) {
                alert('请输入有效的数值');
                return;
            }
            
            const change = newVal - original;
            const percentChange = original !== 0 ? (change / original) * 100 : 0;
            const ratio = original !== 0 ? newVal / original : 0;
            
            document.getElementById('result').style.display = 'block';
            
            const changeEl = document.getElementById('change');
            changeEl.textContent = change.toFixed(4);
            changeEl.className = 'result-value ' + (change >= 0 ? 'positive' : 'negative');
            
            const percentEl = document.getElementById('percentChange');
            percentEl.textContent = (percentChange >= 0 ? '+' : '') + percentChange.toFixed(2) + '%';
            percentEl.className = 'result-value ' + (percentChange >= 0 ? 'positive' : 'negative');
            
            document.getElementById('ratio').textContent = ratio.toFixed(4);
        }
        
        function clearCalc() {
            document.getElementById('original').value = '';
            document.getElementById('new').value = '';
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
